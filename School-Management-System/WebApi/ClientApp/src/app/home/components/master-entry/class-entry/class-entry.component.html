<h2 class="mb-4">Add Class</h2>
<form [formGroup]="classForm" (ngSubmit)="addClass()" class="p-fluid">
    <div class="formgrid grid">

        <div class="field col-6">
            <label>Class Name</label>
            <input type="text" pInputText formControlName="name" />
        </div>

        <div class="field col-6">
            <label>Room Number</label>
            <input type="text" pInputText formControlName="roomNumber" />
        </div>
        <div class="col-12 text-right mt-2">
            <button type="submit" pButton label="Register" class="p-button-success"
                [disabled]="classForm.invalid"></button>
        </div>
    </div>
</form>
<div class="card">
    <p-table [value]="classList" dataKey="id" editMode="row" [tableStyle]="{'min-width': '50rem'}">
        <ng-template pTemplate="header">
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Room Number</th>
                <th>Action</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-class let-rowIndex="rowIndex" let-editing="editing" let-ri="rowIndex">
            <tr [pEditableRow]="class">
                <td>{{ rowIndex + 1 }}</td>
                <td>{{ class.name }}</td>
                <td>{{class.roomNumber}}</td>
                <td><i pTooltip="edit" class="pi pi-pencil" (click)="EditClass(class)"></i></td>
            </tr>
        </ng-template>
    </p-table>
</div>
