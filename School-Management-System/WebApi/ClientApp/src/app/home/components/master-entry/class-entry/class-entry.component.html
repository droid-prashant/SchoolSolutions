<p-toast></p-toast>
<app-page-header
    section="Master Entry"
    page="Class Entry"
    subtitle="Create and maintain class records with a shared form pattern.">
</app-page-header>
<form [formGroup]="classForm" (ngSubmit)="submit()" class="p-fluid">
    <div class="formgrid grid">

        <div class="field col-6">
            <label>Class Name</label>
            <input type="text" pInputText formControlName="name" />
        </div>

        <div class="field col-6">
            <label>Order Number</label>
            <input type="text" pInputText formControlName="orderNumber" />
        </div>
        <div class="col-12 text-right mt-2">
            <button type="submit" pButton [label]="submitButtonLabel" class="p-button-success"
                [disabled]="classForm.invalid || isSubmitted"></button>
        </div>
    </div>
</form>
<div class="card">
    <p-table [value]="classList" styleClass="app-grid-table" dataKey="id" editMode="row" [paginator]="true" [rows]="15"
        [rowsPerPageOptions]="[15, 30, 50]" [scrollable]="true" scrollHeight="34rem" [tableStyle]="{'min-width': '50rem'}">
        <ng-template pTemplate="header">
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Order Number</th>
                <th>Action</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-class let-rowIndex="rowIndex" let-editing="editing" let-ri="rowIndex">
            <tr [pEditableRow]="class">
                <td>{{ rowIndex + 1 }}</td>
                <td>{{ class.name }}</td>
                <td>{{ class.orderNumber }}</td>
                <td><i pTooltip="edit" class="pi pi-pencil" (click)="editClass(class)"></i></td>
            </tr>
        </ng-template>
    </p-table>
</div>
