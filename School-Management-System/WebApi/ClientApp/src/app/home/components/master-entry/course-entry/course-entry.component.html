<p-toast></p-toast>
<app-page-header
    section="Master Entry"
    page="Course Entry"
    subtitle="Add course definitions before mapping them to classes.">
</app-page-header>
<form [formGroup]="courseForm" (ngSubmit)="submit()" class="p-fluid">
    <div class="formgrid grid">

        <div class="field col-6">
            <label>Course Name</label>
            <input type="text" pInputText formControlName="name" />
        </div>
        <div class="col-12 text-right mt-2">
            <button type="submit" pButton [label]="submitButtonLabel" class="p-button-success"
                [disabled]="courseForm.invalid || isSubmitted"></button>
        </div>
    </div>
</form>

<div class="card">
    <p-table [value]="courses" styleClass="app-grid-table" [paginator]="true" [rows]="15"
        [rowsPerPageOptions]="[15, 30, 50]" [scrollable]="true" scrollHeight="34rem"
        [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template pTemplate="header">
            <tr>
                <th>Id</th>
                <th>Course Name</th>
                <th>Action</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-course let-rowIndex="rowIndex">
            <tr>
                <td>{{ rowIndex + 1 }}</td>
                <td>{{ course.name }}</td>
                <td>
                <td><i pTooltip="edit" class="pi pi-pencil" (click)="editCourse(course)"></i></td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="3" class="text-center">No records found</td>
            </tr>
        </ng-template>
    </p-table>
</div>
