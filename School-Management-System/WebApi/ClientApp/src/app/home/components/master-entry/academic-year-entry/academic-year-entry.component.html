<p-toast></p-toast>
<app-page-header section="Master Entry" page="Academic Year Entry"
    subtitle="Create and manage academic years in the shared entry format.">
</app-page-header>
<div class="card">
    <form [formGroup]="academicYearForm" (ngSubmit)="submit()" class="p-fluid">
        <div class="formgrid grid">
            <div class="field col-6">
                <label>Academic Year Name</label>
                <input type="text" pInputText formControlName="yearName" />
            </div>
            <div class="field col-6">
                <label>Active</label>
                <div class="switch-container">
                </div>
                <p-inputSwitch formControlName="isActive"></p-inputSwitch>
            </div>
            <!-- <div class="field col-6">
                <label>Start Date</label>
                <p-calendar formControlName="startDate" />
            </div>
            <div class="field col-6">
                <label>End Date</label>
                <p-calendar formControlName="endDate" />
            </div> -->
            <div class="field col-3">
                <label>Start Date <span class="text-danger">*</span></label>
                <app-np-datepicker [language]="'ne'" [unicodeDate]="false"
                    [selectedDate]="academicYearForm.get('startDateNp')?.value" [selectedDateType]="'bs'"
                    [minDate]="{ year: 2050, month: 1, day: 1 }" [maxDate]="{ year: 2099, month: 12, day: 30 }"
                    (dateChange)="onStartDateChange($event)">
                </app-np-datepicker>
            </div>

            <div class="field col-3">
                <label>End Date <span class="text-danger">*</span></label>
                <app-np-datepicker [language]="'ne'" [unicodeDate]="false"
                    [selectedDate]="academicYearForm.get('endDateNp')?.value" [selectedDateType]="'bs'"
                    [minDate]="{ year: 2050, month: 1, day: 1 }" [maxDate]="{ year: 2099, month: 12, day: 30 }"
                    (dateChange)="onEndDateChange($event)">
                </app-np-datepicker>
            </div>
        </div>
        <div class="col-12 text-right mt-2">
            <button type="submit" pButton [label]="submitButtonLabel" class="p-button-success"
                [disabled]="academicYearForm.invalid || isSubmitted"></button>
        </div>
    </form>
</div>

<div class="card">
    <p-table [value]="academicYearList" styleClass="app-grid-table" dataKey="id" [paginator]="true" [rows]="15"
        [rowsPerPageOptions]="[15, 30, 50]" [scrollable]="true" scrollHeight="34rem"
        [tableStyle]="{'min-width': '50rem'}">
        <ng-template pTemplate="header">
            <tr>
                <th>Id</th>
                <th>Year Name</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Active</th>
                <th>Action</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-academic let-rowIndex="rowIndex" let-editing="editing" let-ri="rowIndex">
            <tr>
                <td>{{ rowIndex + 1 }}</td>
                <td>{{ academic.yearName }}</td>
                <td>{{ academic.startDateFormatted }}</td>
                <td>{{ academic.endDateFormatted }}</td>
                <td>{{ academic.isActive }}</td>
                <td><i pTooltip="edit" class="pi pi-pencil" (click)="editAcademicYear(academic)"></i></td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="6" class="text-center">No records found</td>
            </tr>
        </ng-template>
    </p-table>
</div>
