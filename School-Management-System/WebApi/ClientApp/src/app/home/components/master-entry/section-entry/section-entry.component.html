<p-toast></p-toast>
<app-page-header
    section="Master Entry"
    page="Section Entry"
    subtitle="Create section records using the shared page header style.">
</app-page-header>
<form [formGroup]="sectionForm" (ngSubmit)="submit()" class="p-fluid">
    <div class="formgrid grid">

        <div class="field col-6">
            <label>Section Name</label>
            <input type="text" pInputText formControlName="name" />
        </div>
        <div class="col-12 text-right mt-2">
            <button type="submit" pButton [label]="submitButtonLable" class="p-button-success"
                [disabled]="sectionForm.invalid"></button>
        </div>
    </div>
</form>
<div class="card">
    <p-table [value]="sections" styleClass="app-grid-table" dataKey="id" editMode="row" [paginator]="true" [rows]="15"
        [rowsPerPageOptions]="[15, 30, 50]" [scrollable]="true" scrollHeight="34rem" [tableStyle]="{'min-width': '50rem'}">
        <ng-template pTemplate="header">
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Action</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-section let-rowIndex="rowIndex" let-editing="editing" let-ri="rowIndex">
            <tr>
                <td>{{ rowIndex + 1 }}</td>
                <td>{{ section.name }}</td>
                <td><i pTooltip="edit" class="pi pi-pencil" (click)="editSection(section)"></i></td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="3" class="text-center">No records found</td>
            </tr>
        </ng-template>
    </p-table>
</div>
