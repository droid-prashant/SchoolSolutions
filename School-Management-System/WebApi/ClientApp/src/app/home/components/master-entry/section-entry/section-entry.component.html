<p-toast></p-toast>
<h2 class="mb-4">Add Section</h2>
<form [formGroup]="sectionForm" (ngSubmit)="submit()" class="p-fluid">
    <div class="formgrid grid">

        <div class="field col-6">
            <label>Section Name</label>
            <input type="text" pInputText formControlName="name" />
        </div>
        <div class="col-12 text-right mt-2">
            <button type="submit" pButton [label]="submitButtonLable" class="p-button-success"
                [disabled]="sectionForm.invalid"></button>
        </div>
    </div>
</form>
<div class="card">
    <p-table [value]="sections" dataKey="id" editMode="row" [tableStyle]="{'min-width': '50rem'}">
        <ng-template pTemplate="header">
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Action</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-section let-rowIndex="rowIndex" let-editing="editing" let-ri="rowIndex">
            <tr>
                <td>{{ rowIndex + 1 }}</td>
                <td>{{ section.name }}</td>
                <td><i pTooltip="edit" class="pi pi-pencil" (click)="editSection(section)"></i></td>
            </tr>
        </ng-template>
    </p-table>
</div>
