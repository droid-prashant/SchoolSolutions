<app-page-header
    section="Master Entry"
    page="Fee Types"
    subtitle="Create reusable fee master data before mapping amounts class-wise.">
</app-page-header>
<form [formGroup]="feeTypeForm" (ngSubmit)="submit()" class="p-fluid fee-type-form">
    <div class="formgrid grid">

        <div class="field col-6">
            <label class="form-label">Fee Type</label>
            <input type="text" pInputText formControlName="name" />
        </div>


        <div class="field col-6">
            <label class="form-label d-block mb-2">Recurring</label>
            <div class="switch-container">
                <p-inputSwitch formControlName="isRecurring" [disabled]="isManualFee()"></p-inputSwitch>
            </div>
        </div>

        <div class="field col-6">
            <label class="form-label">Frequency</label>
            <p-dropdown
                [options]="frequencyOptions"
                optionLabel="label"
                optionValue="value"
                formControlName="frequency"
                appendTo="body"
                placeholder="Select frequency">
            </p-dropdown>
        </div>

        <div class="field col-6">
            <label class="form-label">Applicability</label>
            <p-dropdown
                [options]="applicabilityOptions"
                optionLabel="label"
                optionValue="value"
                formControlName="applicability"
                appendTo="body"
                placeholder="Select applicability">
            </p-dropdown>
        </div>

        <div class="col-12 text-right mt-2">
            <button type="submit" pButton [label]="submitButtonLabel" class="p-button-success" [disabled]="feeTypeForm.invalid || isSubmitted">
            </button>
        </div>

    </div>
</form>
<div class="card app-page-table-card fee-type-table-card">
    <p-table #feeTypeTable [value]="feeTypes" styleClass="app-grid-table" dataKey="id" editMode="row" [paginator]="true" [rows]="15"
        [rowsPerPageOptions]="[15, 30, 50]" [scrollable]="true" scrollHeight="flex" paginatorDropdownAppendTo="body" [tableStyle]="{'min-width': '50rem'}"
        [globalFilterFields]="['name', 'frequency']">
        <ng-template pTemplate="caption">
            <span class="p-input-icon-left app-page-search" *ngIf="feeTypes.length > 0">
                <i class="pi pi-search"></i>
                <input #feeTypeSearch type="text" pInputText placeholder="Search grid..."
                    (input)="feeTypeTable.filterGlobal(feeTypeSearch.value, 'contains')" />
            </span>
        </ng-template>
        <ng-template pTemplate="header">
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Recurring</th>
                <th>Frequency</th>
                <th>Applicability</th>
                <th>Action</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-row let-rowIndex="rowIndex" let-editing="editing" let-ri="rowIndex">
            <tr [pEditableRow]="row">
                <td>{{ rowIndex + 1 }}</td>
                <td>{{ row.name }}</td>
                <td>{{isRecurringFee(row.isRecurring) }}</td>
                <td>{{row.frequency}}</td>
                <td>{{ getApplicabilityLabel(row.applicability) }}</td>
                <td><i pTooltip="edit" class="pi pi-pencil" (click)="editFeeType(row)"></i></td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="6" class="text-center">No records found</td>
            </tr>
        </ng-template>
    </p-table>
</div>
