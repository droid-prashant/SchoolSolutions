<h2 class="mb-4">Generate Certificate</h2>
<div class="classDropdown">
    <p-dropdown [options]="classRooms" optionLabel="name" optionValue="id" (onChange)="onClassRoomChange($event)"
        placeholder="Select Class"></p-dropdown>
</div>
<div class="card">
    <p-table [value]="students" [paginator]="true" [rows]="5" [tableStyle]="{ 'min-width': '50rem' }"
        [rowsPerPageOptions]="[5, 10, 20]">
        <ng-template pTemplate="header">
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Class</th>
                <th>Section</th>
                <th>Gender</th>
                <th>Address</th>
                <th>Action</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-student let-rowIndex="rowIndex">
            <tr>
                <td>{{ rowIndex + 1 }}</td>
                <td>{{ student.name }}</td>
                <td>{{ student.classRoom }}</td>
                <td>{{ student.section }}</td>
                <td>{{ student.gender }}</td>
                <td>{{ student.address }}</td>
                <td><span><i pTooltip="Character Certificate" class="pi pi-eye certificate"
                            (click)="previewCharacterCertificate(student)"></i></span>
                    <span><i pTooltip="Transfer Certificate" class="pi pi-eye"
                            (click)="previewTransferCertificate(student)"></i></span>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
<p-dialog header="Report Preview" [(visible)]="showResult" [draggable]="false" [closable]="true"
    [dismissableMask]="true" [contentStyle]="{ padding: '0', overflow: 'auto', background: '#fff' }"
    [baseZIndex]="10000" (onHide)="onDialogClose()">
    <div id="print-section" *ngIf="showResult">
        <div *ngIf="isTransferCertificate">
            <app-transfer-certificate></app-transfer-certificate>
        </div>
        <div *ngIf="isCharacterCertificate">
            <app-character-certificate></app-character-certificate>
        </div>
    </div>
    <ng-template pTemplate="header">
        <div class="header-wrapper">
            <i pTooltip="Print Result" class="pi pi-print clickable-icon header-print" printSectionId="print-section"
                [useExistingCss]="true" ngxPrint>
            </i>
        </div>
    </ng-template>
</p-dialog>
