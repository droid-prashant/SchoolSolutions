<p-toast></p-toast>

<app-page-header
    section="Security"
    page="User Role Assignment"
    subtitle="Assign one or more roles to application users.">
</app-page-header>

<div class="surface-card shadow-2 p-4 border-round">
    <div class="grid">
        <div class="col-12 md:col-5">
            <div class="field">
                <label for="user">User</label>
                <p-dropdown
                    inputId="user"
                    [options]="users"
                    [(ngModel)]="selectedUserId"
                    optionLabel="userName"
                    optionValue="id"
                    placeholder="Select User"
                    [filter]="true"
                    (onChange)="onUserChange()">
                    <ng-template pTemplate="item" let-user>
                        <div>
                            <strong>{{ user.userName }}</strong>
                            <span class="user-email">{{ user.email }}</span>
                        </div>
                    </ng-template>
                </p-dropdown>
            </div>
        </div>

        <div class="col-12 md:col-7">
            <div class="field">
                <label for="roles">Roles</label>
                <p-multiSelect
                    inputId="roles"
                    [options]="roles"
                    [(ngModel)]="selectedRoleNames"
                    optionLabel="name"
                    optionValue="name"
                    placeholder="Assign Roles"
                    display="chip">
                </p-multiSelect>
            </div>
        </div>
    </div>

    <div class="flex justify-content-end mt-3">
        <button pButton pRipple type="button" icon="pi pi-save" label="Save Roles" (click)="saveRoles()"></button>
    </div>
</div>

<div class="card mt-4">
    <p-table [value]="users" styleClass="app-grid-table" [paginator]="true" [rows]="15">
        <ng-template pTemplate="header">
            <tr>
                <th>User</th>
                <th>Email</th>
                <th>Roles</th>
                <th>Status</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-user>
            <tr>
                <td>{{ user.userName }}</td>
                <td>{{ user.email || '-' }}</td>
                <td>{{ user.roles.length ? user.roles.join(', ') : '-' }}</td>
                <td>
                    <p-tag [severity]="user.isActive ? 'success' : 'danger'" [value]="user.isActive ? 'Active' : 'Inactive'"></p-tag>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
