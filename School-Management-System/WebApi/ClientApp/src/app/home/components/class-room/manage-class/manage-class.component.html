<p-toast></p-toast>
<div><h2>Class Management</h2></div>
<form [formGroup]="classSectionFormGroup">
    <div class="card">
        <p-table [value]="classList" dataKey="id" editMode="row" [tableStyle]="{'min-width': '50rem'}">
            <ng-template pTemplate="header">
                <tr>
                    <th style="width:25%">Id</th>
                    <th style="width:25%">Name</th>
                    <th style="width:25%">Section</th>
                    <th style="width:25%">Room Number</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-class let-rowIndex="rowIndex" let-editing="editing" let-ri="rowIndex">
                <tr [pEditableRow]="class">
                    <td>{{ rowIndex + 1 }}</td>
                    <td>{{ class.name }}</td>
                    <td [formGroup]="getFormGroupAt(rowIndex)">
                        <p-cellEditor>
                            <ng-template pTemplate="input">
                                <p-multiSelect [options]="sections" optionLabel="name" optionValue="sectionId" filer="false"
                                    formControlName="classSection" placeholder="Select Sections" />
                            </ng-template>
                            <ng-template pTemplate="output">
                                <p-multiSelect [options]="sections" optionLabel="name"
                                    optionValue="sectionId" formControlName="classSection" filer="false"
                                    placeholder="Select Sections" />
                            </ng-template>
                        </p-cellEditor>
                    </td>
                    <td>{{ class.roomNumber }}</td>
                    <td>
                        <div class="flex align-items-center justify-content-center gap-2">
                            <button *ngIf="!editing" pButton pRipple type="button" pInitEditableRow icon="pi pi-pencil"
                                (click)="onRowEditInit(class.id, rowIndex)" class="p-button-rounded p-button-text">
                            </button>
                            <button *ngIf="editing" pButton pRipple type="button" pSaveEditableRow icon="pi pi-check"
                                (click)="onRowEditSave()"
                                class="p-button-rounded p-button-text p-button-success mr-2">
                            </button>
                            <button *ngIf="editing" pButton pRipple type="button" pCancelEditableRow icon="pi pi-times"
                               (click)="onRowEditCancel()" class="p-button-rounded p-button-text p-button-danger">
                            </button>
                        </div>
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </div>
</form>
