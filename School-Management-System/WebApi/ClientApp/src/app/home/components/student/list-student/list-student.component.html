<p-toast></p-toast>
<app-page-header
    section="Student Section"
    page="All Students"
    subtitle="Load, search, and manage student records from one place.">
</app-page-header>
<p-card class="app-page-filter-card">
    <app-student-filter [showClassFilter]="true" [showSectionFilter]="true"
        (loadStudents)="onLoadStudents($event)"></app-student-filter>
</p-card>

<div class="app-page-toolbar">
    <div class="app-page-toolbar-left">
        <span class="p-input-icon-left app-page-search" *ngIf="students.length > 0">
            <i class="pi pi-search"></i>
            <input type="text" pInputText placeholder="Search students..." [(ngModel)]="searchText"
                (input)="onSearchChange()" />
        </span>
    </div>

    <div class="app-page-toolbar-right">
        <button pButton type="button" label="Add Student" icon="pi pi-plus" class="p-button-success p-button-sm"
            (click)="openAddStudentDialog()"></button>
    </div>
</div>

<div class="card app-page-table-card">
    <p-table [value]="filteredStudents" styleClass="app-grid-table" [paginator]="true" [rows]="6"
        [rowsPerPageOptions]="[15, 30, 50]" [scrollable]="true" scrollHeight="34rem"
        [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template pTemplate="header">
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Class</th>
                <th>Section</th>
                <th>Roll Number</th>
                <th>Gender</th>
                <th>Address</th>
                <th>Action</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-student let-rowIndex="rowIndex">
            <tr>
                <td>{{ rowIndex + 1 }}</td>
                <td>{{ student.firstName }} {{ student.lastName }}</td>
                <td>{{ getClassName(student.classRoomId) }}</td>
                <td>{{ getSectionName(student.sectionId) }}</td>
                <td>{{ student.rollNumber }}</td>
                <td>{{ getGender(student.gender) }}</td>
                <td>{{ student.address }}</td>
                <td>
                    <div class="app-grid-actions">
                        <button
                            pButton
                            pRipple
                            type="button"
                            icon="pi pi-pencil"
                            pTooltip="Edit student"
                            tooltipPosition="top"
                            class="p-button-text app-grid-action-btn"
                            (click)="editStudent(student)">
                        </button>
                    </div>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="8" class="text-center">No records found</td>
            </tr>
        </ng-template>
    </p-table>
</div>

<!-- Add Student Dialog -->
<p-dialog header="Add Student" [modal]="true" [(visible)]="isAddDialogVisible" [style]="{ width: '70vw' }">
    <app-add-student *ngIf="isAddDialogVisible" [isEditMode]="false" (studentSaved)="onStudentSaved()">
    </app-add-student>
</p-dialog>

<!-- Edit Student Dialog -->
<p-dialog header="Edit Student" [modal]="true" [(visible)]="isEditDialogVisible" [style]="{ width: '70vw' }">
    <app-add-student *ngIf="isEditDialogVisible" [isEditMode]="true" [studentToEdit]="selectedStudent" (studentSaved)="onStudentSaved()">
    </app-add-student>
</p-dialog>
