<p-toast></p-toast>
<div class="card">
    <p-table [value]="students" [paginator]="true" [rows]="5" [tableStyle]="{ 'min-width': '50rem' }"
        [rowsPerPageOptions]="[5, 10, 20]">
        <ng-template pTemplate="header">
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Class</th>
                <th>Section</th>
                <th>Gender</th>
                <th>Address</th>
                <th>Action</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-student let-rowIndex="rowIndex">
            <tr>
                <td>{{ rowIndex + 1 }}</td>
                <td>{{ student.firstName }}  {{ student.lastName }}</td>
                <td>{{ getClassName(student.classRoomId) }}</td>
                <td>{{ getSectionName(student.sectionId) }}</td>
                <td>{{ getGender(student.gender) }}</td>
                <td>{{ student.address }}</td>
                <td>
                    <div class="speeddial-linear-demo">
                        <p-speedDial [model]="getActionItems(student)" direction="left" showIcon="pi pi-bars" hideIcon="pi pi-times"
                            class="font-medium mb-2" />
                    </div>
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>

<!-- Edit Student Dialog -->
<p-dialog header="Edit Student" [modal]="true" [(visible)]="isEditDialogVisible" [style]="{ width: '70vw' }">
    <app-add-student 
        [isEditMode]="true" 
        [studentToEdit]="selectedStudent"
        (studentSaved)="onStudentSaved()">
    </app-add-student>
</p-dialog>
