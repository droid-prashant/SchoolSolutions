<app-page-header
    section="Exams"
    page="Results"
    subtitle="Load students by class and section to preview and print results.">
</app-page-header>
<p-card class="app-page-filter-card">
    <app-student-filter [showClassFilter]="true" [showSectionFilter]="true"
        (loadStudents)="onLoadStudents($event)"></app-student-filter>
</p-card>
<div class="card app-page-table-card">
    <p-table [value]="students" styleClass="app-grid-table" [paginator]="true" [rows]="15"
        [rowsPerPageOptions]="[15, 30, 50]" [scrollable]="true" scrollHeight="34rem"
        [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template pTemplate="header">
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Class</th>
                <th>Section</th>
                <th>Action</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-student let-rowIndex="rowIndex">
            <tr>
                <td>{{ rowIndex + 1 }}</td>
                <td>{{ student.firstName }} {{ student.lastName }}</td>
                <td>{{ getClassRoomName(student.classRoomId) }}</td>
                <td>{{ getSectionName(student.sectionId) }}</td>
                <td><i pTooltip="view result" class="pi pi-eye" (click)="previewResult(student)"></i></td>
            </tr>
        </ng-template>
    </p-table>
</div>

<p-dialog header="Report Preview" [(visible)]="showResult" [draggable]="false" [closable]="true"
    [dismissableMask]="true" [style]="{ width: '250mm', maxWidth: '100%', maxHeight:'100%', overflow: 'auto' }"
    [contentStyle]="{ padding: '0', overflow: 'auto', background: '#fff' }" [baseZIndex]="10000">
    <div id="print-section" *ngIf="showResult">
        <app-result-preview [resultObj]="result" [studentObj]="student"></app-result-preview>
    </div>
    <ng-template pTemplate="header">
        <div class="header-wrapper">
            <i pTooltip="Print Result" class="pi pi-print clickable-icon header-print" printSectionId="print-section"
                [useExistingCss]="true" ngxPrint>
            </i>
        </div>
    </ng-template>
</p-dialog>
