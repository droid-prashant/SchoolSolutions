<div class="np-datepicker-wrapper">
  <input
    pInputText
    [placeholder]="placeholder"
    [value]="displayDate"
    readonly
    class="np-datepicker-input"
    (click)="toggleCalendar()"
  />

  <div class="np-calendar" *ngIf="showCalendar">
    <div class="np-calendar-header">
      <button type="button" (click)="prevMonth()">&lt;</button>
      <select [(ngModel)]="currentMonth" (change)="selectYearMonth(currentYear, currentMonth)">
        <option *ngFor="let m of months; let i=index" [value]="i+1">{{ language==='ne' ? m.bs : m.en }}</option>
      </select>
      <select [(ngModel)]="currentYear" (change)="selectYearMonth(currentYear, currentMonth)">
        <option *ngFor="let y of years" [value]="y">{{ y }}</option>
      </select>
      <button type="button" (click)="nextMonth()">&gt;</button>
    </div>

    <table>
      <thead>
        <tr><th>Su</th><th>Mo</th><th>Tu</th><th>We</th><th>Th</th><th>Fr</th><th>Sa</th></tr>
      </thead>
      <tbody>
        <tr *ngFor="let week of calendar">
          <td *ngFor="let day of week">
            <button type="button" [disabled]="!day || isDisabled(day)" (click)="selectDate(day)">
              {{ day ? (unicodeDate ? toNepaliDigits(day.toString()) : day) : '' }}
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="np-calendar-footer">
      <button type="button" (click)="selectToday()">Today</button>
    </div>
  </div>
</div>
